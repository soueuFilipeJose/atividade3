<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Filipe José Rigonatto Ortiz — IA Visual</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />

  <style>
    :root {
      --bg:       #0a0c10;
      --surface:  #111318;
      --border:   #1f2330;
      --accent:   #00e5ff;
      --accent2:  #7c3aed;
      --text:     #e8eaf0;
      --muted:    #6b7280;
      --radius:   16px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Noise grain overlay ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0;
    }

    /* ── Header ── */
    header {
      position: relative; z-index: 1;
      border-bottom: 1px solid var(--border);
      padding: 1.5rem 2rem;
      display: flex; align-items: center; gap: 1rem;
    }
    .logo-dot {
      width: 10px; height: 10px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 12px var(--accent);
      animation: pulse 2s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: .4; transform: scale(1.4); }
    }
    .site-title {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(1rem, 3vw, 1.4rem);
      letter-spacing: -.02em;
      color: var(--text);
    }
    .site-title span { color: var(--accent); }
    .badge-ai {
      margin-left: auto;
      font-family: 'DM Mono', monospace;
      font-size: .65rem;
      letter-spacing: .08em;
      padding: .25rem .6rem;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--muted);
      white-space: nowrap;
    }

    /* ── Main layout ── */
    main {
      position: relative; z-index: 1;
      padding: 3rem 1rem 4rem;
    }

    /* ── Card ── */
    .card-main {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 0 60px rgba(0,229,255,.04);
    }

    /* ── Webcam panel ── */
    #webcam-container {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d0f14;
      border-bottom: 1px solid var(--border);
      min-height: 240px;
      padding: 1.5rem;
    }
    #webcam-container canvas {
      border-radius: 12px;
      border: 2px solid var(--border);
      display: block;
      max-width: 100%;
      box-shadow: 0 0 40px rgba(0,229,255,.08);
    }
    .cam-placeholder {
      text-align: center;
      color: var(--muted);
    }
    .cam-placeholder i { font-size: 3rem; margin-bottom: .75rem; display: block; }
    .cam-placeholder p { font-size: .8rem; }

    /* ── Body of card ── */
    .card-body-custom { padding: 2rem; }

    /* ── Start Button ── */
    .btn-start {
      width: 100%;
      padding: 1rem;
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: #000;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform .15s, box-shadow .15s;
      box-shadow: 0 0 24px rgba(0,229,255,.35);
    }
    .btn-start::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,.18), transparent);
      pointer-events: none;
    }
    .btn-start:hover  { transform: translateY(-2px); box-shadow: 0 0 36px rgba(0,229,255,.55); }
    .btn-start:active { transform: translateY(0);     box-shadow: 0 0 16px rgba(0,229,255,.3); }
    .btn-start:disabled {
      opacity: .45; cursor: not-allowed;
      transform: none; box-shadow: none;
    }
    .btn-start .btn-icon { margin-right: .5rem; font-size: 1.1rem; vertical-align: -.1em; }

    /* ── Divider label ── */
    .section-label {
      font-size: .65rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
      display: flex; align-items: center; gap: .75rem;
    }
    .section-label::after {
      content: ''; flex: 1;
      height: 1px; background: var(--border);
    }

    /* ── Label / Progress container ── */
    #label-container { margin-top: 1.5rem; display: flex; flex-direction: column; gap: 1.1rem; }

    .prediction-item {}
    .prediction-header {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: .45rem;
    }
    .prediction-class {
      font-size: .78rem;
      letter-spacing: .06em;
      color: var(--text);
      text-transform: uppercase;
    }
    .prediction-pct {
      font-size: .85rem;
      font-weight: 500;
      color: var(--accent);
      font-family: 'Syne', sans-serif;
    }

    .progress-track {
      height: 8px;
      background: var(--border);
      border-radius: 999px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 999px;
      width: 0%;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      transition: width .25s ease;
      box-shadow: 0 0 8px rgba(0,229,255,.4);
    }

    /* ── Status pill ── */
    #status-pill {
      display: inline-flex; align-items: center; gap: .4rem;
      font-size: .7rem; letter-spacing: .06em;
      padding: .3rem .75rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--muted);
      margin-bottom: 1.25rem;
      transition: all .3s;
    }
    #status-pill.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(0,229,255,.06);
    }
    #status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
    }
    #status-pill.active #status-dot { animation: pulse 1.2s infinite; }

    /* ── Footer ── */
    footer {
      position: relative; z-index: 1;
      text-align: center;
      font-size: .7rem;
      color: var(--muted);
      padding-bottom: 2rem;
      letter-spacing: .04em;
    }

    /* ── Responsive ── */
    @media (min-width: 768px) {
      #webcam-container { min-height: 280px; }
    }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header>
  <div class="logo-dot"></div>
  <div class="site-title">Filipe José<span>.</span></div>
  <div class="badge-ai"><i class="bi bi-cpu me-1"></i>Teachable Machine</div>
</header>

<!-- ── Main ── -->
<main>
  <div class="container" style="max-width:560px;">

    <!-- Status -->
    <div class="mb-3">
      <span id="status-pill">
        <span id="status-dot"></span>
        <span id="status-text">AGUARDANDO INÍCIO</span>
      </span>
    </div>

    <!-- Card -->
    <div class="card-main">

      <!-- Webcam -->
      <div id="webcam-container">
        <div class="cam-placeholder">
          <i class="bi bi-camera-video-off"></i>
          <p>A câmera será ativada ao clicar em Iniciar</p>
        </div>
      </div>

      <!-- Body -->
      <div class="card-body-custom">

        <!-- Button -->
        <button class="btn-start" id="startBtn" onclick="init()">
          <i class="bi bi-camera-video btn-icon"></i>Ativar Câmera &amp; Iniciar
        </button>

        <!-- Predictions -->
        <div id="label-container"></div>

      </div>
    </div>
  </div>
</main>

<!-- ── Footer ── -->
<footer>
  <p>© 2025 Filipe José Rigonatto Ortiz — Powered by Teachable Machine + TensorFlow.js</p>
</footer>

<!-- ── Scripts ── -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script>
  const URL = "https://teachablemachine.withgoogle.com/models/ZM5k5nh0z/";
  let model, webcam, labelContainer, maxPredictions;

  async function init() {
    const btn = document.getElementById('startBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status"></span>Carregando modelo…';

    setStatus('CARREGANDO MODELO…', false);

    try {
      const modelURL    = URL + "model.json";
      const metadataURL = URL + "metadata.json";

      model = await tmImage.load(modelURL, metadataURL);
      maxPredictions = model.getTotalClasses();

      const flip = true;
      webcam = new tmImage.Webcam(280, 280, flip);
      await webcam.setup();
      await webcam.play();
      window.requestAnimationFrame(loop);

      // Replace placeholder with canvas
      const container = document.getElementById("webcam-container");
      container.innerHTML = '';
      container.appendChild(webcam.canvas);

      // Build prediction items
      labelContainer = document.getElementById("label-container");
      labelContainer.innerHTML = '';

      // Section label
      const lbl = document.createElement('div');
      lbl.className = 'section-label';
      lbl.textContent = 'Classificações';
      labelContainer.appendChild(lbl);

      for (let i = 0; i < maxPredictions; i++) {
        const item = document.createElement('div');
        item.className = 'prediction-item';
        item.innerHTML = `
          <div class="prediction-header">
            <span class="prediction-class" id="class-name-${i}">—</span>
            <span class="prediction-pct" id="class-pct-${i}">0%</span>
          </div>
          <div class="progress-track">
            <div class="progress-fill" id="class-bar-${i}"></div>
          </div>`;
        labelContainer.appendChild(item);
      }

      setStatus('CÂMERA ATIVA', true);
      btn.innerHTML = '<i class="bi bi-check-circle me-2"></i>Câmera Ativa';

    } catch (err) {
      console.error(err);
      btn.disabled = false;
      btn.innerHTML = '<i class="bi bi-camera-video btn-icon"></i>Tentar Novamente';
      setStatus('ERRO — TENTE NOVAMENTE', false);
    }
  }

  async function loop() {
    webcam.update();
    await predict();
    window.requestAnimationFrame(loop);
  }

  async function predict() {
    const prediction = await model.predict(webcam.canvas);
    for (let i = 0; i < maxPredictions; i++) {
      const prob = prediction[i].probability;
      const pct  = (prob * 100).toFixed(1);

      document.getElementById(`class-name-${i}`).textContent = prediction[i].className;
      document.getElementById(`class-pct-${i}`).textContent  = pct + '%';
      document.getElementById(`class-bar-${i}`).style.width  = pct + '%';
    }
  }

  function setStatus(text, active) {
    const pill = document.getElementById('status-pill');
    document.getElementById('status-text').textContent = text;
    pill.classList.toggle('active', active);
  }
</script>

</body>
</html>
